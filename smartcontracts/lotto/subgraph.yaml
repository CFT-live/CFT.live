specVersion: 0.0.5
schema:
  file: ./subgraph/schema.graphql

dataSources:
  - kind: ethereum
    name: CFTLotto
    network: arbitrum-one
    source:
      address: "0x7815A6C73036Fa933CdD1b5Aa7fd18EC77383c39"
      abi: CFTLotto
      startBlock: 399878097
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Draw
        - User
        - TicketPurchase
        - Claim
        - Refund
        - GlobalStats
      abis:
        - name: CFTLotto
          file: ./artifacts/contracts/Lotto.sol/CFTLotto.json
      eventHandlers:
        - event: DrawStarted(indexed uint256,uint256)
          handler: handleDrawStarted
        - event: TicketsPurchased(indexed uint256,indexed address,uint256)
          handler: handleTicketsPurchased
        - event: DrawClosed(indexed uint256)
          handler: handleDrawClosed
        - event: RandomnessRequested(indexed uint256,uint256)
          handler: handleRandomnessRequested
        - event: WinnerSelected(indexed uint256,address,uint256)
          handler: handleWinnerSelected
        - event: WinningsClaimed(indexed uint256,address,uint256)
          handler: handleWinningsClaimed
        - event: DrawCancelled(indexed uint256,string)
          handler: handleDrawCancelled
        - event: RefundClaimed(indexed uint256,indexed address,uint256)
          handler: handleRefundClaimed
      file: ./subgraph/mapping.ts